<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - Internal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .breadcrumb {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb a {
            color: #2a5298;
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #6c757d;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .file-item:hover {
            background-color: #f8f9fa;
        }

        .file-item a {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            width: 100%;
        }

        .file-icon {
            font-size: 1.5em;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 500;
            font-size: 1.1em;
            color: #2a5298;
        }

        .file-meta {
            font-size: 0.85em;
            color: #6c757d;
            margin-top: 3px;
        }

        .error-message {
            text-align: center;
            padding: 50px;
            color: #dc3545;
            background: #f8d7da;
            margin: 20px;
            border-radius: 8px;
        }

        .empty-message {
            text-align: center;
            padding: 50px;
            color: #6c757d;
            font-style: italic;
        }

        .search-bar {
            padding: 20px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: #2a5298;
        }

        .error-details {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 Project - Internal</h1>
            <p>Repository Browser</p>
        </div>
        
        <div class="breadcrumb" id="breadcrumb">
            <a href="#" onclick="navigateTo('')">🏠 Root</a>
            <span id="currentPath"></span>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cari file atau folder...">
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Memuat isi repository...</p>
            </div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'aliridof';
        const REPO_NAME = 'project-internal';
        let currentPath = '';
        let allItems = [];

        // Fungsi untuk mengambil isi folder dari GitHub API
        async function fetchContents(path = '') {
            // Gunakan URL API yang benar
            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
            
            console.log('Fetching from:', apiUrl); // Untuk debugging
            
            try {
                const response = await fetch(apiUrl, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                // Debug response
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    
                    if (response.status === 403) {
                        throw new Error('Rate limit exceeded. Coba lagi nanti atau gunakan token.');
                    } else if (response.status === 404) {
                        throw new Error(`Folder atau file tidak ditemukan. Path: "${path}". Pastikan repository "dof-project" ada di akun "${REPO_OWNER}".`);
                    } else {
                        throw new Error(`HTTP error! status: ${response.status}. ${errorText}`);
                    }
                }
                
                const data = await response.json();
                console.log('Data received:', data); // Debug data
                return data;
                
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        // Fungsi untuk memformat ukuran file
        function formatFileSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            else return (bytes / 1048576).toFixed(2) + ' MB';
        }

        // Fungsi untuk mendapatkan ikon berdasarkan tipe file
        function getFileIcon(item) {
            if (item.type === 'dir') return '📁';
            
            const ext = item.name.split('.').pop().toLowerCase();
            const iconMap = {
                'html': '🌐',
                'css': '🎨',
                'js': '⚡',
                'json': '📋',
                'md': '📝',
                'txt': '📄',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'svg': '🖼️',
                'pdf': '📕',
                'zip': '📦',
                'rar': '📦',
                'py': '🐍',
                'java': '☕',
                'cpp': '⚙️',
                'c': '⚙️',
                'php': '🐘',
                'rb': '💎',
                'go': '🔵'
            };
            
            return iconMap[ext] || '📄';
        }

        // Fungsi untuk menampilkan isi folder
        function displayContents(items) {
            const content = document.getElementById('content');
            
            if (!items || items.length === 0) {
                content.innerHTML = '<div class="empty-message">📭 Folder ini kosong</div>';
                return;
            }

            // Pisahkan folder dan file
            const folders = items.filter(item => item.type === 'dir');
            const files = items.filter(item => item.type === 'file');
            
            // Urutkan: folder dulu, lalu file
            allItems = [...folders.sort((a, b) => a.name.localeCompare(b.name)), 
                       ...files.sort((a, b) => a.name.localeCompare(b.name))];

            renderItems(allItems);
        }

        // Fungsi untuk merender items
        function renderItems(items) {
            const content = document.getElementById('content');
            
            let html = '<ul class="file-list">';
            
            if (currentPath !== '') {
                html += `
                    <li class="file-item">
                        <a href="#" onclick="event.preventDefault(); navigateTo('${getParentPath(currentPath)}')">
                            <span class="file-icon">📂</span>
                            <div class="file-info">
                                <div class="file-name">.. (Kembali)</div>
                            </div>
                        </a>
                    </li>`;
            }

            items.forEach(item => {
                const icon = getFileIcon(item);
                const size = item.size ? formatFileSize(item.size) : '';
                
                html += `
                    <li class="file-item">
                        <a href="#" onclick="event.preventDefault(); ${item.type === 'dir' ? 
                            `navigateTo('${item.path}')` : 
                            `window.open('${item.html_url}', '_blank')`}">
                            <span class="file-icon">${icon}</span>
                            <div class="file-info">
                                <div class="file-name">${item.name}</div>
                                <div class="file-meta">${item.type === 'dir' ? 'Folder' : size}</div>
                            </div>
                        </a>
                    </li>`;
            });

            html += '</ul>';
            content.innerHTML = html;
        }

        // Fungsi untuk navigasi ke folder tertentu
        async function navigateTo(path) {
            console.log('Navigating to:', path);
            currentPath = path;
            document.getElementById('currentPath').textContent = path ? ' / ' + path : '';
            document.getElementById('searchInput').value = '';
            
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Memuat...</p></div>';
            
            try {
                const items = await fetchContents(path);
                
                if (Array.isArray(items)) {
                    displayContents(items);
                } else if (items && items.type === 'file') {
                    // Jika hasilnya file, tampilkan sebagai single item
                    displayContents([items]);
                } else {
                    content.innerHTML = `
                        <div class="error-message">
                            <h3>❌ Format data tidak sesuai</h3>
                            <p>Data yang diterima bukan array atau file.</p>
                            <div class="error-details">
                                <pre>${JSON.stringify(items, null, 2)}</pre>
                            </div>
                        </div>`;
                }
            } catch (error) {
                content.innerHTML = `
                    <div class="error-message">
                        <h3>❌ Gagal memuat konten</h3>
                        <p>${error.message}</p>
                        <div class="error-details">
                            <p>Repository: ${REPO_OWNER}/${REPO_NAME}</p>
                            <p>Path: ${path || '(root)'}</p>
                            <p>Cek console browser untuk detail error.</p>
                            <button onclick="testConnection()" style="margin-top:10px; padding:10px 20px; cursor:pointer;">
                                Test Koneksi API
                            </button>
                        </div>
                    </div>`;
            }
        }

        // Fungsi untuk test koneksi
        async function testConnection() {
            console.log('Testing connection...');
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`);
                const data = await response.json();
                console.log('Repository info:', data);
                alert('Repository ditemukan!\nNama: ' + data.full_name + '\nVisibility: ' + data.visibility);
            } catch (error) {
                console.error('Test failed:', error);
                alert('Test gagal: ' + error.message);
            }
        }

        // Fungsi untuk mendapatkan path parent
        function getParentPath(path) {
            const parts = path.split('/');
            parts.pop();
            return parts.join('/');
        }

        // Fungsi pencarian
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                
                if (searchTerm === '') {
                    renderItems(allItems);
                    return;
                }
                
                const filtered = allItems.filter(item => 
                    item.name.toLowerCase().includes(searchTerm)
                );
                
                if (filtered.length === 0) {
                    document.getElementById('content').innerHTML = 
                        '<div class="empty-message">🔍 Tidak ada hasil untuk "' + searchTerm + '"</div>';
                } else {
                    renderItems(filtered);
                }
            });
        }

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Starting DOF Project Browser...');
            console.log('Owner:', REPO_OWNER);
            console.log('Repo:', REPO_NAME);
            setupSearch();
            navigateTo('');
        });
    </script>
</body>
</html>
